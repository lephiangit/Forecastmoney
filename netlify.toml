[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# NOTE: API proxy redirect is NOT needed because the frontend calls
# NEXT_PUBLIC_API_URL directly (set in Netlify environment variables).
# The old /api/* redirect was a non-functional placeholder.
